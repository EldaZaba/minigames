<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico" />
  <title>Breakout (Arkanoid) - Mě to nebaví CZ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/theme.css" />
  <script src="../assets/theme.js" defer></script>
  <style>
    body {
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; padding: clamp(16px,3vw,32px); gap: 1rem;
    }
    header { text-align: center; }
    #breakoutCanvas {
      width: min(92vw, 420px); height: auto; aspect-ratio: 4 / 5;
      border-radius: 18px; border: 1px solid var(--surface-border);
      box-shadow: var(--shadow-soft); background: #0f172a; touch-action: none;
    }
  </style>
</head>
<body class="game-page">
  <header>
    <h1 class="hero-title">Breakout</h1>
    <p class="hero-subtitle">Rozbijte všechny cihly a nenechte míček spadnout.</p>
  </header>

  <div class="panel game-shell" role="main" aria-label="Breakout">
    <div class="hud">
      <div class="score-pill">Skóre: <span id="score">0</span></div>
      <div class="score-pill">Level: <span id="levelDisplay">1</span></div>
    </div>
    <div class="controls">
      <button id="btnStart" class="btn">Start</button>
      <button id="btnRestart" class="btn btn-secondary">Restart</button>
    </div>
    <canvas id="breakoutCanvas" width="420" height="525" aria-label="Hra Breakout"></canvas>
    <p class="hint">Šipky vlevo/vpravo nebo tažení prstem.</p>
  </div>
  <a href="../games.html" class="link-back">Zpět na výběr her</a>

  <script>
    const canvas = document.getElementById('breakoutCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('levelDisplay');

    const W = canvas.width, H = canvas.height;
    const BASE_BALL_SPEED = 2.6;
    const MAX_BOUNCE = 6;
    const PADDLE_SPEED = 6;

    const LEVELS = [
      { rows: 4, cols: 7, speedMult: 1.0, pattern: 'full', hardRows: 0 },
      { rows: 5, cols: 7, speedMult: 1.15, pattern: 'full', hardRows: 1 },
      { rows: 5, cols: 7, speedMult: 1.3, pattern: 'checkerboard', hardRows: 1 },
      { rows: 5, cols: 8, speedMult: 1.5, pattern: 'pyramid', hardRows: 2 },
      { rows: 6, cols: 8, speedMult: 1.7, pattern: 'diamond', hardRows: 3 },
    ];

    const BRICK_COLORS = [
      ['#38bdf8','#0284c7'],
      ['#22c55e','#15803d'],
      ['#fbbf24','#d97706'],
      ['#f97316','#ea580c'],
      ['#ef4444','#b91c1c'],
      ['#a855f7','#7e22ce'],
    ];
    const HARD_COLOR = ['#e2e8f0','#94a3b8'];

    let paddle = { width: 90, height: 12, x: 0, y: H - 24, speed: PADDLE_SPEED };
    let ball = { x: 0, y: 0, radius: 8, dx: 0, dy: 0 };
    let bricks = [];
    let score = 0, level = 1;
    let running = false, gameOver = false, victory = false;
    let rightPressed = false, leftPressed = false;
    let lastTime = 0;
    let levelClearing = false;

    function levelConfig() { return LEVELS[Math.min(level - 1, LEVELS.length - 1)]; }

    function brickInPattern(r, c, pattern, rows, cols) {
      if (pattern === 'full') return true;
      if (pattern === 'checkerboard') return (r + c) % 2 === 0;
      if (pattern === 'pyramid') return c >= r && c <= cols - 1 - r;
      if (pattern === 'diamond') {
        const mid = Math.floor(rows / 2);
        const dist = Math.abs(r - mid);
        return c >= dist && c <= cols - 1 - dist;
      }
      return true;
    }

    function initBricks() {
      const cfg = levelConfig();
      const { rows, cols, pattern, hardRows } = cfg;
      const padH = 10, padV = 8;
      const offsetTop = 55, offsetLeft = 18;
      const brickW = (W - offsetLeft * 2 - padH * (cols - 1)) / cols;
      const brickH = 16;
      bricks = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (!brickInPattern(r, c, pattern, rows, cols)) continue;
          const isHard = r < hardRows;
          bricks.push({
            x: offsetLeft + c * (brickW + padH),
            y: offsetTop + r * (brickH + padV),
            w: brickW, h: brickH,
            hits: isHard ? 2 : 1,
            maxHits: isHard ? 2 : 1,
            colorIdx: r % BRICK_COLORS.length,
            isHard,
          });
        }
      }
    }

    function resetBall() {
      const cfg = levelConfig();
      const spd = BASE_BALL_SPEED * cfg.speedMult * 60;
      ball.x = W / 2; ball.y = H - 60;
      ball.dx = spd; ball.dy = -spd;
      paddle.x = (W - paddle.width) / 2;
    }

    function resetGame() {
      score = 0; level = 1;
      running = false; gameOver = false; victory = false;
      levelClearing = false;
      initBricks(); resetBall();
      scoreEl.textContent = 0; levelEl.textContent = 1;
      lastTime = 0;
    }

    function nextLevel() {
      level++;
      levelClearing = false;
      if (level > LEVELS.length) {
        victory = true; running = false; return;
      }
      levelEl.textContent = level;
      initBricks(); resetBall();
      running = true;
    }

    function drawBrick(b) {
      const [c1, c2] = b.isHard && b.hits === 2 ? HARD_COLOR : BRICK_COLORS[b.colorIdx];
      const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
      grad.addColorStop(0, c1);
      grad.addColorStop(1, c2);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(b.x, b.y, b.w, b.h, 4);
      ctx.fill();
      if (b.isHard && b.hits === 2) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    function draw() {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, W, H);

      bricks.forEach(drawBrick);

      ctx.fillStyle = '#38bdf8';
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 6);
      ctx.fill();

      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = '#f97316';
      ctx.fill();

      ctx.fillStyle = '#e2e8f0';
      ctx.font = '16px "Space Grotesk", sans-serif';
      ctx.textAlign = 'center';
      if (!running && !gameOver && !victory && !levelClearing)
        ctx.fillText('Klikněte Start', W / 2, H / 2);
      if (gameOver)
        ctx.fillText('Konec hry — Restart', W / 2, H / 2);
      if (victory) {
        ctx.fillText('Gratulujeme! Všechny levely!', W / 2, H / 2 - 12);
        ctx.fillText(`Skóre: ${score}`, W / 2, H / 2 + 14);
      }
      if (levelClearing) {
        ctx.font = 'bold 20px "Space Grotesk", sans-serif';
        ctx.fillText(`Level ${level - 1} splněn! 🎉`, W / 2, H / 2);
      }
    }

    function collisions(delta) {
      const toRemove = [];
      for (const b of bricks) {
        if (
          ball.x + ball.radius > b.x && ball.x - ball.radius < b.x + b.w &&
          ball.y + ball.radius > b.y && ball.y - ball.radius < b.y + b.h
        ) {
          ball.dy = -ball.dy;
          b.hits--;
          if (b.hits <= 0) { toRemove.push(b); score += b.maxHits; scoreEl.textContent = score; }
          break;
        }
      }
      toRemove.forEach(b => bricks.splice(bricks.indexOf(b), 1));
      if (bricks.length === 0 && !levelClearing) {
        levelClearing = true;
        running = false;
        setTimeout(() => { level++; nextLevel(); }, 1400);
      }
    }

    function update(time = 0) {
      if (!lastTime) lastTime = time;
      const raw = Math.min((time - lastTime) / 1000, 0.05);
      lastTime = time;

      if (running) {
        let md = 0;
        if (rightPressed) md += 1;
        if (leftPressed) md -= 1;
        if (md) {
          paddle.x += md * paddle.speed * 60 * raw;
          paddle.x = Math.max(0, Math.min(W - paddle.width, paddle.x));
        }

        ball.x += ball.dx * raw;
        ball.y += ball.dy * raw;

        if (ball.x + ball.radius > W) { ball.x = W - ball.radius; ball.dx = -Math.abs(ball.dx); }
        else if (ball.x - ball.radius < 0) { ball.x = ball.radius; ball.dx = Math.abs(ball.dx); }
        if (ball.y - ball.radius < 0) { ball.y = ball.radius; ball.dy = Math.abs(ball.dy); }

        if (ball.y + ball.radius > H) {
          running = false; gameOver = true;
        }

        if (
          ball.y + ball.radius >= paddle.y &&
          ball.y + ball.radius <= paddle.y + paddle.height &&
          ball.x > paddle.x && ball.x < paddle.x + paddle.width
        ) {
          ball.y = paddle.y - ball.radius;
          ball.dy = -Math.abs(ball.dy);
          const hit = (ball.x - paddle.x) / paddle.width - 0.5;
          ball.dx = hit * MAX_BOUNCE * 60;
        }

        collisions(raw);
      }

      draw();
      requestAnimationFrame(update);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') { rightPressed = true; e.preventDefault(); }
      if (e.key === 'ArrowLeft') { leftPressed = true; e.preventDefault(); }
    });
    document.addEventListener('keyup', e => {
      if (e.key === 'ArrowRight') rightPressed = false;
      if (e.key === 'ArrowLeft') leftPressed = false;
    });
    canvas.addEventListener('pointermove', e => {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (W / rect.width) - paddle.width / 2;
      paddle.x = Math.max(0, Math.min(W - paddle.width, x));
    });

    document.getElementById('btnStart').addEventListener('click', () => {
      if (gameOver || victory) resetGame();
      running = true;
    });
    document.getElementById('btnRestart').addEventListener('click', () => {
      resetGame(); running = true;
    });

    resetGame();
    update();
  </script>
</body>
</html>
