<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico" />
  <title>Pexeso (Memory) - Mě to nebaví CZ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/theme.css" />
  <script src="../assets/theme.js" defer></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: clamp(16px, 3vw, 32px);
      gap: 1rem;
    }
    header { text-align: center; }
    .mode-row { display: flex; gap: 8px; }
    .mode-btn {
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      border: 1.5px solid var(--surface-border);
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }
    #gameBoard {
      --card-size: clamp(70px, 18vw, 96px);
      display: grid;
      grid-template-columns: repeat(4, var(--card-size));
      gap: 12px;
      justify-content: center;
    }
    .card {
      width: var(--card-size);
      height: var(--card-size);
      border-radius: 16px;
      border: 1px solid var(--surface-border);
      box-shadow: var(--shadow-soft);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(30px, 6vw, 46px);
      cursor: pointer;
      user-select: none;
      position: relative;
      perspective: 600px;
      background: var(--surface);
    }
    .card.flipped .front { transform: rotateY(0deg); }
    .card.flipped .back { transform: rotateY(180deg); }
    .card .front, .card .back {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      backface-visibility: hidden;
      transition: transform 0.35s;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
    }
    .card .front {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: transparent;
      transform: rotateY(180deg);
    }
    .card.flipped .front { color: #fff; }
    .card .back {
      background: var(--surface-2);
      color: var(--text);
      font-size: clamp(28px, 5.6vw, 42px);
    }
    .score-pill.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #ffffff;
      border-color: transparent;
    }
    #statusMsg {
      min-height: 1.4rem;
      font-size: 0.92rem;
      color: var(--text-muted);
      text-align: center;
    }
    @media (max-width: 520px) { #gameBoard { gap: 10px; } }
  </style>
</head>
<body class="game-page">
  <header>
    <h1 class="hero-title">Pexeso</h1>
    <p class="hero-subtitle">Najděte všechny dvojice karet co nejrychleji.</p>
  </header>

  <div class="panel game-shell" role="main" aria-label="Pexeso">
    <div class="mode-row">
      <button id="btnVsHuman" class="mode-btn active">vs Hráč</button>
      <button id="btnVsAI" class="mode-btn">vs Počítač</button>
    </div>
    <div id="gameBoard" aria-label="Herní plocha pexesa" role="grid"></div>
    <div id="playerInfo" class="hud" aria-live="polite">
      <span id="player1" class="score-pill active">Hráč 1: 0</span>
      <span id="player2" class="score-pill">Hráč 2: 0</span>
    </div>
    <p id="statusMsg"></p>
    <div class="controls">
      <button id="btnRestart" class="btn btn-secondary">Restart</button>
    </div>
  </div>
  <a href="../games.html" class="link-back">Zpět na výběr her</a>

  <script>
    const symbols = ['🍎','🍌','🍇','🍉','🍒','🥝','🍍','🍓'];
    let cards = [], flippedCards = [], matchedCount = 0;
    let currentPlayer = 1, scores = {1: 0, 2: 0};
    let vsAI = false, aiLocked = false;
    const aiMemory = new Map();

    const gameBoard = document.getElementById('gameBoard');
    const p1El = document.getElementById('player1');
    const p2El = document.getElementById('player2');
    const statusMsg = document.getElementById('statusMsg');

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function createCards() {
      cards = [];
      symbols.forEach(s => {
        cards.push({ symbol: s, id: Math.random() });
        cards.push({ symbol: s, id: Math.random() });
      });
      cards = shuffle(cards);
    }

    function renderCards() {
      gameBoard.innerHTML = '';
      cards.forEach((card, index) => {
        const el = document.createElement('div');
        el.className = 'card';
        el.setAttribute('role', 'button');
        el.setAttribute('tabindex', '0');
        el.setAttribute('aria-label', 'Karta');
        el.dataset.index = index;

        const front = document.createElement('div');
        front.className = 'front';
        front.textContent = card.symbol;

        const back = document.createElement('div');
        back.className = 'back';
        back.textContent = '❓';

        el.appendChild(front);
        el.appendChild(back);
        el.addEventListener('click', () => flipCard(el));
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipCard(el); }
        });
        gameBoard.appendChild(el);
      });
    }

    function updatePlayerInfo() {
      const label2 = vsAI ? 'Počítač' : 'Hráč 2';
      p1El.textContent = `Hráč 1: ${scores[1]}`;
      p2El.textContent = `${label2}: ${scores[2]}`;
      p1El.classList.toggle('active', currentPlayer === 1);
      p2El.classList.toggle('active', currentPlayer === 2);
    }

    function setStatus(msg) { statusMsg.textContent = msg; }

    function flipCard(el) {
      if (aiLocked) return;
      if (vsAI && currentPlayer === 2) return;
      if (flippedCards.length === 2) return;
      if (el.classList.contains('flipped') || el.classList.contains('matched')) return;

      el.classList.add('flipped');
      flippedCards.push(el);

      const idx = parseInt(el.dataset.index);
      aiMemory.set(idx, cards[idx].symbol);

      if (flippedCards.length === 2) {
        aiLocked = true;
        setTimeout(checkMatch, 900);
      }
    }

    function checkMatch() {
      const [c1, c2] = flippedCards;
      const i1 = parseInt(c1.dataset.index);
      const i2 = parseInt(c2.dataset.index);

      if (cards[i1].symbol === cards[i2].symbol) {
        c1.classList.add('matched');
        c2.classList.add('matched');
        matchedCount += 2;
        scores[currentPlayer]++;
        updatePlayerInfo();
        flippedCards = [];
        aiLocked = false;

        if (matchedCount === cards.length) {
          const label2 = vsAI ? 'Počítač' : 'Hráč 2';
          if (scores[1] > scores[2]) setStatus('Hráč 1 vyhrál!');
          else if (scores[2] > scores[1]) setStatus(`${label2} vyhrál!`);
          else setStatus('Remíza!');
          return;
        }
        if (vsAI && currentPlayer === 2) {
          setTimeout(doAITurn, 600);
        }
      } else {
        flippedCards.forEach(c => c.classList.remove('flipped'));
        flippedCards = [];
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        updatePlayerInfo();
        aiLocked = false;
        if (vsAI && currentPlayer === 2) {
          setStatus('Počítač přemýšlí…');
          setTimeout(doAITurn, 800);
        }
      }
    }

    function getUnflippedIndices() {
      return Array.from(gameBoard.querySelectorAll('.card:not(.flipped):not(.matched)'))
        .map(el => parseInt(el.dataset.index));
    }

    function doAITurn() {
      const unflipped = getUnflippedIndices();
      if (unflipped.length === 0) return;

      let pick1 = null, pick2 = null;

      const known = new Map();
      for (const idx of unflipped) {
        if (aiMemory.has(idx)) {
          const sym = aiMemory.get(idx);
          if (known.has(sym)) {
            pick1 = known.get(sym);
            pick2 = idx;
            break;
          } else {
            known.set(sym, idx);
          }
        }
      }

      if (pick1 === null) {
        const shuffled = shuffle([...unflipped]);
        pick1 = shuffled[0];
        pick2 = shuffled[1] ?? shuffled[0];
      }

      const el1 = gameBoard.querySelector(`.card[data-index="${pick1}"]`);
      const el2 = gameBoard.querySelector(`.card[data-index="${pick2}"]`);
      if (!el1 || !el2) { aiLocked = false; return; }

      el1.classList.add('flipped');
      flippedCards.push(el1);
      aiMemory.set(pick1, cards[pick1].symbol);
      setStatus('');

      setTimeout(() => {
        el2.classList.add('flipped');
        flippedCards.push(el2);
        aiMemory.set(pick2, cards[pick2].symbol);
        setTimeout(checkMatch, 900);
      }, 600);
    }

    function restartGame() {
      matchedCount = 0;
      scores = {1: 0, 2: 0};
      currentPlayer = 1;
      flippedCards = [];
      aiLocked = false;
      aiMemory.clear();
      createCards();
      renderCards();
      updatePlayerInfo();
      setStatus('');
    }

    document.getElementById('btnVsHuman').addEventListener('click', () => {
      vsAI = false;
      document.getElementById('btnVsHuman').classList.add('active');
      document.getElementById('btnVsAI').classList.remove('active');
      p2El.textContent = 'Hráč 2: 0';
      restartGame();
    });

    document.getElementById('btnVsAI').addEventListener('click', () => {
      vsAI = true;
      document.getElementById('btnVsAI').classList.add('active');
      document.getElementById('btnVsHuman').classList.remove('active');
      restartGame();
    });

    document.getElementById('btnRestart').addEventListener('click', restartGame);

    restartGame();
  </script>
</body>
</html>
