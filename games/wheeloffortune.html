<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico" />
  <title>Kolo štěstí &amp; Team Maker - Mě to nebaví CZ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/theme.css" />
  <script src="../assets/theme.js" defer></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: clamp(16px, 3vw, 32px);
      gap: 1rem;
    }
    header { text-align: center; }

    /* ── Tabs ────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 0.25rem;
      border-bottom: 2px solid var(--surface-border);
      margin-bottom: 1.25rem;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 0.55rem 1.1rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-muted);
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-pane { display: none; }
    .tab-pane.active { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }

    /* ── Shared inputs ───────────────────────────── */
    .add-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .add-row input[type="text"],
    .add-row input[type="number"] {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--surface-border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .add-row input:focus { border-color: var(--accent); }
    .add-row input[type="number"] { flex: 0 0 70px; }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .item-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--surface-border);
      background: var(--surface);
    }
    .item-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .item-label {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .item-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      flex-shrink: 0;
    }
    .item-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s;
      line-height: 1;
    }
    .item-remove:hover { color: var(--accent-2); }

    /* ── Wheel ───────────────────────────────────── */
    .wheel-wrap {
      position: relative;
      width: min(92vw, 400px);
      aspect-ratio: 1 / 1;
    }
    #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; display: block; }
    .pointer {
      position: absolute;
      top: 50%; right: -18px;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-top: 18px solid transparent;
      border-bottom: 18px solid transparent;
      border-right: 36px solid var(--accent);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
      z-index: 10;
    }
    .result-box {
      min-height: 2.5rem;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      color: var(--accent);
    }

    /* ── Team Maker ──────────────────────────────── */
    .tm-settings {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .tm-settings label { font-weight: 600; font-size: 0.95rem; white-space: nowrap; }
    .tm-settings input[type="number"] {
      width: 70px;
      padding: 0.45rem 0.6rem;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--surface-border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .tm-settings input[type="number"]:focus { border-color: var(--accent); }

    /* Teams grid + cards */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      width: 100%;
    }
    .team-card {
      border-radius: var(--radius-md);
      border: 1.5px solid var(--surface-border);
      overflow: hidden;
    }
    .team-card__header {
      padding: 0.35rem 0.7rem;
      font-weight: 700;
      font-size: 0.85rem;
      color: #fff;
    }
    .team-card__members {
      padding: 0.5rem 0.7rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      background: var(--surface-2);
    }
    .team-card__member {
      font-size: 0.88rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .tm-empty {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
    }

    /* ── Shuffle animation ───────────────────────── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.88); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes memberIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: none; }
    }
    .team-card.animating {
      animation: cardIn 0.4s cubic-bezier(0.34,1.48,0.64,1) both;
    }
    .team-card__member.animating {
      animation: memberIn 0.25s ease-out both;
    }
    /* During shuffle phase: blur member names so they look like they're cycling */
    .teams-grid.is-shuffling .team-card__members {
      filter: blur(3px);
      opacity: 0.55;
      user-select: none;
    }
    .teams-grid.is-shuffling .team-card {
      pointer-events: none;
    }

    .full-width { width: 100%; }
  </style>
</head>
<body class="game-page">
  <header>
    <h1 class="hero-title">Kolo štěstí &amp; Team Maker</h1>
    <p class="hero-subtitle">Otočte kolem nebo náhodně rozdělte lidi do týmů.</p>
  </header>

  <div class="panel game-shell" role="main" style="width:min(98vw,540px)">

    <div class="tab-bar" role="tablist">
      <button class="tab-btn active" role="tab" aria-selected="true"  data-tab="wheel">
        <i class="fas fa-dharmachakra" aria-hidden="true"></i> Kolo štěstí
      </button>
      <button class="tab-btn" role="tab" aria-selected="false" data-tab="teams">
        <i class="fas fa-users" aria-hidden="true"></i> Team Maker
      </button>
    </div>

    <!-- ── Kolo štěstí ─────────────────────────────── -->
    <div id="pane-wheel" class="tab-pane active" role="tabpanel">
      <div class="wheel-wrap" aria-label="Kolo štěstí">
        <canvas id="wheelCanvas" width="420" height="420"></canvas>
        <div class="pointer" aria-hidden="true"></div>
      </div>
      <div class="controls">
        <button id="btnSpin" class="btn">
          <i class="fas fa-sync-alt" aria-hidden="true"></i> Točit!
        </button>
      </div>
      <p id="wheelResult" class="result-box" aria-live="polite"></p>
      <div class="panel full-width" style="background:var(--surface-2)">
        <p style="font-weight:600;margin-bottom:0.5rem">Segmenty kola</p>
        <div class="add-row">
          <input id="segInput" type="text" maxlength="40" placeholder="Nový segment…" aria-label="Text nového segmentu" />
          <button id="btnSegAdd" class="btn" style="white-space:nowrap">
            <i class="fas fa-plus" aria-hidden="true"></i> Přidat
          </button>
        </div>
        <ul id="segmentList" class="item-list" aria-label="Seznam segmentů"></ul>
      </div>
    </div>

    <!-- ── Team Maker ──────────────────────────────── -->
    <div id="pane-teams" class="tab-pane" role="tabpanel">
      <div class="panel full-width" style="background:var(--surface-2)">
        <p style="font-weight:600;margin-bottom:0.5rem">Lidé</p>
        <div class="add-row">
          <input id="tmInput" type="text" maxlength="40" placeholder="Jméno osoby…" aria-label="Jméno nové osoby" />
          <button id="tmBtnAdd" class="btn" style="white-space:nowrap">
            <i class="fas fa-plus" aria-hidden="true"></i> Přidat
          </button>
        </div>
        <ul id="tmPeopleList" class="item-list" aria-label="Seznam lidí"></ul>
      </div>

      <div class="panel full-width" style="background:var(--surface-2)">
        <div class="tm-settings">
          <label for="tmTeamCount">Počet týmů:</label>
          <input id="tmTeamCount" type="number" min="2" max="20" value="2" aria-label="Počet týmů" />
          <button id="tmBtnShuffle" class="btn">
            <i class="fas fa-random" aria-hidden="true"></i> Rozdělit
          </button>
          <button id="tmBtnClear" class="btn btn-secondary" title="Vymazat výsledky">
            <i class="fas fa-trash" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <div id="tmResult" class="full-width" aria-live="polite"></div>
    </div>

  </div>

  <a href="../games.html" class="link-back">Zpět na výběr her</a>

  <script>
    /* ── Palette ─────────────────────────────────── */
    const PALETTE = [
      '#f97316','#3b82f6','#22c55e','#ef4444','#a855f7',
      '#eab308','#14b8a6','#f43f5e','#6366f1','#84cc16',
      '#f59e0b','#06b6d4','#ec4899','#10b981','#8b5cf6',
    ];
    const color = i => PALETTE[i % PALETTE.length];

    /* ── Tabs ─────────────────────────────────────── */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => {
          b.classList.remove('active'); b.setAttribute('aria-selected','false');
        });
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active'); btn.setAttribute('aria-selected','true');
        document.getElementById('pane-' + btn.dataset.tab).classList.add('active');
      });
    });

    /* ══════════════════════════════════════════════
       KOLO ŠTĚSTÍ
    ══════════════════════════════════════════════ */
    const canvas      = document.getElementById('wheelCanvas');
    const ctx         = canvas.getContext('2d');
    const btnSpin     = document.getElementById('btnSpin');
    const btnSegAdd   = document.getElementById('btnSegAdd');
    const segInput    = document.getElementById('segInput');
    const wheelResult = document.getElementById('wheelResult');
    const segListEl   = document.getElementById('segmentList');

    let segments = ['Možnost 1','Možnost 2','Možnost 3','Možnost 4','Možnost 5','Možnost 6'];
    let wheelAngle = 0, spinning = false;

    function drawWheel() {
      const s = canvas.width, cx = s/2, cy = s/2, r = s/2 - 4, n = segments.length;
      ctx.clearRect(0, 0, s, s);
      if (n === 0) {
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle='#ccc'; ctx.fill();
        ctx.fillStyle='#888'; ctx.font='bold 18px sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('Přidejte segmenty', cx, cy); return;
      }
      const arc = Math.PI*2 / n;
      for (let i = 0; i < n; i++) {
        const s0 = wheelAngle + i*arc, s1 = s0 + arc;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,s0,s1); ctx.closePath();
        ctx.fillStyle = color(i); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.save();
        ctx.translate(cx,cy); ctx.rotate(s0 + arc/2);
        ctx.textAlign='right'; ctx.textBaseline='middle';
        ctx.fillStyle='#fff'; ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=3;
        let lbl = segments[i];
        if (lbl.length > 16) lbl = lbl.slice(0,15)+'…';
        ctx.font = `bold ${Math.max(10,Math.min(18,Math.floor(r*0.18)))}px sans-serif`;
        ctx.fillText(lbl, r-12, 0);
        ctx.restore();
      }
      ctx.beginPath(); ctx.arc(cx,cy,22,0,Math.PI*2);
      ctx.fillStyle='#fff'; ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=2; ctx.stroke();
    }

    function renderSegList() {
      segListEl.innerHTML = '';
      segments.forEach((seg, i) => {
        const li = document.createElement('li');
        li.className = 'item-row';
        li.innerHTML = `
          <span class="item-dot" style="background:${color(i)}"></span>
          <span class="item-label" title="${esc(seg)}">${seg}</span>
          <button class="item-remove" aria-label="Odebrat ${seg}" data-index="${i}">
            <i class="fas fa-times" aria-hidden="true"></i>
          </button>`;
        segListEl.appendChild(li);
      });
    }

    function addSegment() {
      const v = segInput.value.trim(); if (!v) return;
      segments.push(v); segInput.value = '';
      renderSegList(); drawWheel();
    }

    segListEl.addEventListener('click', e => {
      const btn = e.target.closest('.item-remove');
      if (btn) { segments.splice(+btn.dataset.index, 1); renderSegList(); drawWheel(); }
    });
    btnSegAdd.addEventListener('click', addSegment);
    segInput.addEventListener('keydown', e => { if (e.key==='Enter') addSegment(); });

    function easeOut(t) { return 1 - Math.pow(1-t, 4); }

    btnSpin.addEventListener('click', () => {
      if (spinning) return;
      if (segments.length < 2) { wheelResult.textContent = 'Přidejte aspoň 2 segmenty.'; return; }
      spinning = true; btnSpin.disabled = true; wheelResult.textContent = '';
      const total = ((5 + Math.floor(Math.random()*5)) * Math.PI*2) + Math.random()*Math.PI*2;
      const dur = 3500 + Math.random()*1500, t0 = performance.now(), a0 = wheelAngle;
      function frame(now) {
        const t = Math.min((now-t0)/dur, 1);
        wheelAngle = a0 + total * easeOut(t);
        drawWheel();
        if (t < 1) { requestAnimationFrame(frame); return; }
        spinning = false; btnSpin.disabled = false;
        const n = segments.length, arc = Math.PI*2/n;
        const norm = ((wheelAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
        const hit = (Math.PI*2 - (norm - Math.PI + Math.PI*2) % (Math.PI*2)) % (Math.PI*2);
        wheelResult.textContent = '🎉 ' + segments[Math.floor(hit/arc) % n];
      }
      requestAnimationFrame(frame);
    });

    renderSegList(); drawWheel();

    /* ══════════════════════════════════════════════
       TEAM MAKER
    ══════════════════════════════════════════════ */
    const tmInput      = document.getElementById('tmInput');
    const tmBtnAdd     = document.getElementById('tmBtnAdd');
    const tmBtnShuffle = document.getElementById('tmBtnShuffle');
    const tmBtnClear   = document.getElementById('tmBtnClear');
    const tmPeopleList = document.getElementById('tmPeopleList');
    const tmTeamCount  = document.getElementById('tmTeamCount');
    const tmResult     = document.getElementById('tmResult');

    let people = [];

    /* ── Name normalization & grouping ──────────── */
    function norm(s) {
      return s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();
    }

    // All variants that should always land in the same team.
    // Key = canonical normalized name, value = set of matching normalized strings.
    const BUDDY_GROUPS = [
      new Set(['elias','eli','elijas','elda','elik']),              // Eliáš
      new Set(['matej','maty','matyas','mat']),                    // Matěj
      new Set(['martin','marty','martinek','martas']),             // Martin
      new Set(['antonin','tonda','tonik','anton','toni','tonin']), // Antonín
      new Set(['karel','kaja','kare']),                            // Karel
    ];

    // Returns which buddy-group index this name belongs to, or -1
    function buddyGroup(name) {
      const n = norm(name);
      return BUDDY_GROUPS.findIndex(g => g.has(n));
    }

    function isBuddy(name) { return buddyGroup(name) !== -1; }

    /* ── People list rendering ───────────────────── */
    function renderPeopleList() {
      tmPeopleList.innerHTML = '';
      people.forEach((p, i) => {
        const li = document.createElement('li');
        li.className = 'item-row';
        li.innerHTML = `
          <span class="item-dot" style="background:${color(i)}"></span>
          <span class="item-label" title="${esc(p)}">${p}</span>
          <button class="item-remove" aria-label="Odebrat ${p}" data-index="${i}">
            <i class="fas fa-times" aria-hidden="true"></i>
          </button>`;
        tmPeopleList.appendChild(li);
      });
    }

    function addPerson() {
      const v = tmInput.value.trim(); if (!v) return;
      people.push(v); tmInput.value = '';
      renderPeopleList();
    }

    tmPeopleList.addEventListener('click', e => {
      const btn = e.target.closest('.item-remove');
      if (btn) { people.splice(+btn.dataset.index, 1); renderPeopleList(); }
    });
    tmBtnAdd.addEventListener('click', addPerson);
    tmInput.addEventListener('keydown', e => { if (e.key==='Enter') addPerson(); });

    /* ── Shuffle ─────────────────────────────────── */
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    function computeTeams(k) {
      const N = people.length;
      const buddies = shuffle(people.filter(isBuddy));
      const regular = shuffle(people.filter(p => !isBuddy(p)));
      const targetSize = Math.ceil(N / k);
      const teams = Array.from({length: k}, () => []);

      // Pack buddies into consecutive teams: first team gets up to targetSize,
      // overflow spills into the next team, so the minimum number leaves the main group.
      buddies.forEach((p, i) => {
        teams[Math.min(Math.floor(i / targetSize), k - 1)].push(p);
      });

      // Fill remaining spots greedily to keep all team sizes balanced.
      regular.forEach(p => {
        const minIdx = teams.reduce((m, t, i) => t.length < teams[m].length ? i : m, 0);
        teams[minIdx].push(p);
      });

      return teams;
    }

    /* ── Build team cards DOM ────────────────────── */
    function buildGrid(teams, { shuffling = false, animated = false } = {}) {
      const grid = document.createElement('div');
      grid.className = 'teams-grid' + (shuffling ? ' is-shuffling' : '');
      teams.forEach((members, ti) => {
        const card = document.createElement('div');
        card.className = 'team-card' + (animated ? ' animating' : '');
        if (animated) card.style.animationDelay = `${ti * 110}ms`;
        card.innerHTML = `
          <div class="team-card__header" style="background:${color(ti)}">Tým ${ti+1}</div>
          <div class="team-card__members">
            ${members.map((m, mi) => `
              <span class="team-card__member${animated ? ' animating' : ''}"
                    ${animated ? `style="animation-delay:${ti*110 + mi*55 + 180}ms"` : ''}>
                <i class="fas fa-user" style="font-size:0.7rem;opacity:0.55" aria-hidden="true"></i>
                ${m}
              </span>`).join('')}
          </div>`;
        grid.appendChild(card);
      });
      return grid;
    }

    /* ── Animated shuffle + reveal ───────────────── */
    function makeTeams() {
      const kUser = Math.max(2, Math.min(20, parseInt(tmTeamCount.value) || 2));
      if (people.length < kUser) {
        tmResult.innerHTML = `<p class="tm-empty">Přidejte aspoň ${kUser} lidí (máte ${people.length}).</p>`;
        return;
      }

      const finalTeams = computeTeams(kUser);
      tmBtnShuffle.disabled = true;

      // Phase 1: rapid shuffle preview (slot-machine feel)
      const SHUFFLE_MS = 1400, TICK_MS = 90;
      let elapsed = 0;

      const ticker = setInterval(() => {
        const rndTeams = Array.from({length: kUser}, () => []);
        shuffle(people).forEach((p, i) => rndTeams[i % kUser].push(p));
        tmResult.innerHTML = '';
        tmResult.appendChild(buildGrid(rndTeams, { shuffling: true }));

        elapsed += TICK_MS;
        if (elapsed >= SHUFFLE_MS) {
          clearInterval(ticker);
          // Phase 2: reveal final teams with entrance animation
          const wrap = document.createElement('div');
          wrap.appendChild(buildGrid(finalTeams, { animated: true }));
          tmResult.innerHTML = '';
          tmResult.appendChild(wrap);
          tmBtnShuffle.disabled = false;
        }
      }, TICK_MS);
    }

    tmBtnShuffle.addEventListener('click', makeTeams);
    tmBtnClear.addEventListener('click', () => { tmResult.innerHTML = ''; });

    /* ── Utilities ───────────────────────────────── */
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
  </script>
</body>
</html>
