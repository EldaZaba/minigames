<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico" />
  <title>Piškvorky (Tic Tac Toe) - Mě to nebaví CZ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/theme.css" />
  <script src="../assets/theme.js" defer></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: clamp(16px, 3vw, 32px);
      gap: 1rem;
    }
    header { text-align: center; }
    .mode-row {
      display: flex;
      gap: 8px;
    }
    .mode-btn {
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      border: 1.5px solid var(--surface-border);
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .mode-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }
    #gameBoard {
      width: min(90vw, 300px);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .cell {
      aspect-ratio: 1 / 1;
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--surface-border);
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2.4rem, 10vw, 3.2rem);
      cursor: pointer;
      user-select: none;
      transition: background-color 0.15s, transform 0.15s;
    }
    .cell:hover:not(.taken) { background: var(--surface-2); }
    .cell:active:not(.taken) { transform: scale(0.96); }
    .cell.taken { cursor: default; }
    .cell.win { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; }
    #status {
      min-height: 1.6rem;
      font-weight: 600;
      font-size: 1rem;
      text-align: center;
      color: var(--text);
    }
  </style>
</head>
<body class="game-page">
  <header>
    <h1 class="hero-title">Piškvorky</h1>
    <p class="hero-subtitle">Hrajte proti počítači nebo kamarádovi.</p>
  </header>

  <div class="panel game-shell" role="main" aria-label="Piškvorky">
    <div class="mode-row">
      <button id="btnVsAI" class="mode-btn active">vs Počítač</button>
      <button id="btnVsHuman" class="mode-btn">vs Hráč</button>
    </div>
    <div class="mode-row" id="diffRow">
      <button id="btnEasy" class="mode-btn active">Lehký</button>
      <button id="btnHard" class="mode-btn">Těžký</button>
    </div>
    <p id="status" class="status" aria-live="polite"></p>
    <div id="gameBoard" role="grid" aria-label="Piškvorky hra"></div>
    <div class="controls">
      <button id="btnRestart" class="btn btn-secondary">Restart</button>
    </div>
  </div>
  <a href="../games.html" class="link-back">Zpět na výběr her</a>

  <script>
    const HUMAN = 'X', AI = 'O';
    const WIN_PATTERNS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let vsAI = true;
    let difficulty = 'easy';
    let board = Array(9).fill(null);
    let currentPlayer = HUMAN;
    let gameActive = true;
    let aiThinking = false;

    const boardEl = document.getElementById('gameBoard');
    const statusEl = document.getElementById('status');
    const cells = [];

    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.setAttribute('role', 'gridcell');
      cell.setAttribute('aria-label', `Pole ${i + 1}`);
      cell.addEventListener('click', () => handleClick(i));
      boardEl.appendChild(cell);
      cells.push(cell);
    }

    function checkWinner(b) {
      for (const [a, c, d] of WIN_PATTERNS) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) return { winner: b[a], line: [a, c, d] };
      }
      return null;
    }

    function minimax(b, depth, isMax) {
      const res = checkWinner(b);
      if (res) return res.winner === AI ? 10 - depth : depth - 10;
      if (b.every(c => c)) return 0;
      if (isMax) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = AI; best = Math.max(best, minimax(b, depth + 1, false)); b[i] = null; }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) { b[i] = HUMAN; best = Math.min(best, minimax(b, depth + 1, true)); b[i] = null; }
        }
        return best;
      }
    }

    function getBestMove() {
      let bestScore = -Infinity, bestMove = -1;
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = AI;
          const score = minimax(board, 0, false);
          board[i] = null;
          if (score > bestScore) { bestScore = score; bestMove = i; }
        }
      }
      return bestMove;
    }

    function setStatus(msg) { statusEl.textContent = msg; }

    function highlightWin(line) {
      line.forEach(i => cells[i].classList.add('win'));
    }

    function checkEnd() {
      const res = checkWinner(board);
      if (res) {
        highlightWin(res.line);
        if (vsAI) setStatus(res.winner === HUMAN ? 'Vyhráli jste! 🎉' : 'Počítač vyhrál!');
        else setStatus(`Hráč ${res.winner} vyhrál! 🎉`);
        gameActive = false;
        return true;
      }
      if (board.every(c => c)) { setStatus('Remíza!'); gameActive = false; return true; }
      return false;
    }

    function getAIMove() {
      const empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
      if (difficulty === 'easy' && Math.random() < 0.65) {
        return empty[Math.floor(Math.random() * empty.length)];
      }
      return getBestMove();
    }

    function playAI() {
      if (!vsAI || !gameActive) return;
      aiThinking = false;
      const move = getAIMove();
      if (move === -1 || move === undefined) return;
      board[move] = AI;
      cells[move].textContent = AI;
      cells[move].classList.add('taken');
      if (!checkEnd()) {
        currentPlayer = HUMAN;
        setStatus('Na tahu: Hráč X');
      }
    }

    function handleClick(index) {
      if (!gameActive || board[index] || aiThinking) return;
      if (vsAI && currentPlayer !== HUMAN) return;

      board[index] = currentPlayer;
      cells[index].textContent = currentPlayer;
      cells[index].classList.add('taken');

      if (checkEnd()) return;

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';

      if (vsAI) {
        aiThinking = true;
        setStatus('Počítač přemýšlí…');
        setTimeout(playAI, 350);
      } else {
        setStatus(`Na tahu: Hráč ${currentPlayer}`);
      }
    }

    function initGame() {
      board = Array(9).fill(null);
      currentPlayer = HUMAN;
      gameActive = true;
      aiThinking = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      setStatus(vsAI ? 'Vy jste X — zahajte hru.' : 'Na tahu: Hráč X');
    }

    document.getElementById('btnVsAI').addEventListener('click', () => {
      vsAI = true;
      document.getElementById('btnVsAI').classList.add('active');
      document.getElementById('btnVsHuman').classList.remove('active');
      document.getElementById('diffRow').style.display = '';
      initGame();
    });

    document.getElementById('btnVsHuman').addEventListener('click', () => {
      vsAI = false;
      document.getElementById('btnVsHuman').classList.add('active');
      document.getElementById('btnVsAI').classList.remove('active');
      document.getElementById('diffRow').style.display = 'none';
      initGame();
    });

    document.getElementById('btnEasy').addEventListener('click', () => {
      difficulty = 'easy';
      document.getElementById('btnEasy').classList.add('active');
      document.getElementById('btnHard').classList.remove('active');
      initGame();
    });

    document.getElementById('btnHard').addEventListener('click', () => {
      difficulty = 'hard';
      document.getElementById('btnHard').classList.add('active');
      document.getElementById('btnEasy').classList.remove('active');
      initGame();
    });

    document.getElementById('btnRestart').addEventListener('click', initGame);

    initGame();
  </script>
</body>
</html>
